<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Basketball Hoops - прокачка и скины</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }

        /* Контейнер игры */
        .game-container {
            background: #2c1810;
            border-radius: 48px;
            padding: 16px 12px 20px 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #ffd700, 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            background: #87CEEB;
            touch-action: none;
        }

        /* Верхняя панель с ресурсами */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
        }

        .stat-card {
            background: #1a1a2e;
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            flex: 1;
            justify-content: center;
        }

        .stat-emoji {
            font-size: 22px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 18px;
            color: #ffd700;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
        }

        /* Панель управления уровнем и магазином */
        .game-controls {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            background: #ffd700;
            border: none;
            border-radius: 40px;
            padding: 8px 0;
            font-weight: bold;
            font-size: 14px;
            color: #1a1a2e;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 0 #b8860b;
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b8860b;
        }

        .shop-btn {
            background: #9b59b6;
            color: white;
            box-shadow: 0 3px 0 #6c3483;
        }

        /* Модальное окно магазина */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            border: 2px solid #ffd700;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }

        .shop-item {
            background: #0f0f1a;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .shop-item-icon {
            font-size: 40px;
            width: 60px;
            text-align: center;
        }

        .shop-item-info {
            flex: 1;
        }

        .shop-item-name {
            font-weight: bold;
            color: white;
        }

        .shop-item-price {
            font-size: 12px;
            color: #ffd700;
        }

        .buy-btn {
            background: #27ae60;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .buy-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <!-- Панель статистики -->
        <div class="stats-bar">
            <div class="stat-card">
                <span class="stat-emoji">🏆</span>
                <div>
                    <div class="stat-value" id="levelValue">1</div>
                    <div class="stat-label">Уровень</div>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-emoji">⭐</span>
                <div>
                    <div class="stat-value" id="scoreValue">0</div>
                    <div class="stat-label">Очки</div>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-emoji">💰</span>
                <div>
                    <div class="stat-value" id="coinsValue">0</div>
                    <div class="stat-label">Монеты</div>
                </div>
            </div>
        </div>

        <!-- Canvas для игры -->
        <canvas id="gameCanvas" width="400" height="500"></canvas>

        <!-- Кнопки управления -->
        <div class="game-controls">
            <button class="ctrl-btn" id="shopButton">🛒 МАГАЗИН</button>
            <button class="ctrl-btn shop-btn" id="nextLevelBtn">🔥 СЛЕД. УРОВЕНЬ</button>
        </div>
        <div style="font-size: 11px; text-align: center; margin-top: 10px; color: #aaa;">
            👆 ТЯНИ И ОТПУСКАЙ — МЯЧ ЛЕТИТ
        </div>
    </div>

    <!-- Модальное окно магазина -->
    <div id="shopModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>🛒 МАГАЗИН СТИЛЕЙ</span>
                <button class="close-modal" id="closeModalBtn">✖</button>
            </div>
            <div id="shopItemsList"></div>
        </div>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКИ ИГРЫ ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Размеры
    canvas.width = 400;
    canvas.height = 500;

    // Параметры кольца
    const hoop = {
        x: canvas.width / 2 - 20,
        y: 80,
        width: 40,
        height: 8,
        rimRadius: 18
    };

    // МЯЧ
    let ball = {
        x: canvas.width / 2,
        y: canvas.height - 50,
        radius: 12,
        vx: 0,
        vy: 0,
        isDragging: false,
        dragX: 0,
        dragY: 0
    };

    // Игровой счёт
    let gameState = {
        score: 0,           // очки за уровень
        totalScore: 0,      // общий счёт
        coins: 0,           // монеты
        level: 1,
        targetScore: 100,   // нужно очков для перехода
        currentBallSkin: '🏀',
        skins: [
            { id: '🏀', name: 'Классический', price: 0, emoji: '🏀', owned: true },
            { id: '⚽', name: 'Футбольный', price: 100, emoji: '⚽', owned: false },
            { id: '🎾', name: 'Теннисный', price: 200, emoji: '🎾', owned: false },
            { id: '🍊', name: 'Апельсин', price: 350, emoji: '🍊', owned: false },
            { id: '💎', name: 'Алмазный', price: 500, emoji: '💎', owned: false },
            { id: '⚡', name: 'Молния', price: 750, emoji: '⚡', owned: false },
            { id: '🌕', name: 'Лунный', price: 1000, emoji: '🌕', owned: false },
            { id: '🔥', name: 'Огненный', price: 1500, emoji: '🔥', owned: false }
        ]
    };

    // Флаги анимации
    let lastShotResult = null;
    let effectTimer = 0;
    let levelUpMessage = '';
    let levelUpTimer = 0;

    // Параметры сложности уровня
    let currentDifficulty = {
        gravity: 0.25,
        requiredScore: 100,
        rimScale: 1.0
    };

    // Элементы UI
    const levelValueSpan = document.getElementById('levelValue');
    const scoreValueSpan = document.getElementById('scoreValue');
    const coinsValueSpan = document.getElementById('coinsValue');
    const shopModal = document.getElementById('shopModal');
    const shopButton = document.getElementById('shopButton');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const nextLevelBtn = document.getElementById('nextLevelBtn');

    // ==================== ФУНКЦИИ ПРОГРЕССА ====================
    function updateUI() {
        levelValueSpan.textContent = gameState.level;
        scoreValueSpan.textContent = gameState.score;
        coinsValueSpan.textContent = gameState.coins;
    }

    function addPoints(points) {
        gameState.score += points;
        gameState.totalScore += points;
        // Каждые 10 очков даём 1 монету
        let coinsEarned = Math.floor(points / 10);
        if (coinsEarned > 0) gameState.coins += coinsEarned;

        updateUI();

        // Проверка повышения уровня
        if (gameState.score >= gameState.targetScore) {
            levelUp();
        }
    }

    function levelUp() {
        gameState.level++;
        gameState.score = 0;
        gameState.targetScore = 100 + (gameState.level - 1) * 25; // 100, 125, 150, 175...
        gameState.coins += 50;  // Бонус за уровень

        // Бонус за прохождение
        levelUpMessage = `🎉 УРОВЕНЬ ${gameState.level-1} ПРОЙДЕН! +50 МОНЕТ 🎉`;
        levelUpTimer = 60;

        // Усложнение: кольцо становится меньше
        currentDifficulty.rimScale = Math.max(0.7, 1.0 - (gameState.level - 1) * 0.02);

        updateUI();
        resetBall();
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height - 50;
        ball.vx = 0;
        ball.vy = 0;
        ball.isDragging = false;
    }

    function addCoins(amount) {
        gameState.coins += amount;
        updateUI();
    }

    // ==================== ПОКУПКА СКИНОВ ====================
    function buySkin(skinId) {
        const skin = gameState.skins.find(s => s.id === skinId);
        if (!skin || skin.owned) return false;
        if (gameState.coins >= skin.price) {
            gameState.coins -= skin.price;
            skin.owned = true;
            updateUI();
            renderShopItems();
            return true;
        }
        return false;
    }

    function equipSkin(skinId) {
        const skin = gameState.skins.find(s => s.id === skinId);
        if (skin && skin.owned) {
            gameState.currentBallSkin = skin.emoji;
        }
    }

    function renderShopItems() {
        const container = document.getElementById('shopItemsList');
        container.innerHTML = '';
        gameState.skins.forEach(skin => {
            const div = document.createElement('div');
            div.className = 'shop-item';
            div.innerHTML = `
                <div class="shop-item-icon">${skin.emoji}</div>
                <div class="shop-item-info">
                    <div class="shop-item-name">${skin.name}</div>
                    <div class="shop-item-price">💰 ${skin.price} монет</div>
                </div>
                <button class="buy-btn" data-id="${skin.id}" data-action="${skin.owned ? 'equip' : 'buy'}" ${skin.owned && gameState.currentBallSkin === skin.emoji ? 'disabled' : ''}>
                    ${skin.owned ? (gameState.currentBallSkin === skin.emoji ? '✅ ИСП. ' : '🔧 НАДЕТЬ') : '💎 КУПИТЬ'}
                </button>
            `;
            container.appendChild(div);
        });

        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const skinId = btn.dataset.id;
                const action = btn.dataset.action;
                if (action === 'buy') {
                    if (buySkin(skinId)) {
                        equipSkin(skinId);
                        renderShopItems();
                        showTempMessage(`✅ ${gameState.skins.find(s=>s.id===skinId).name} куплен!`);
                    } else {
                        showTempMessage(`❌ Не хватает монет!`);
                    }
                } else if (action === 'equip') {
                    equipSkin(skinId);
                    renderShopItems();
                    showTempMessage(`🎨 Скин ${gameState.skins.find(s=>s.id===skinId).name} надет!`);
                }
            });
        });
    }

    function showTempMessage(msg) {
        lastShotResult = msg;
        effectTimer = 40;
    }

    // ==================== ФИЗИКА И РИСОВАНИЕ ====================
    function updatePhysics() {
        if (ball.isDragging) return;

        // Гравитация
        ball.vy += currentDifficulty.gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Стены
        if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx = -ball.vx * 0.7; }
        if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx = -ball.vx * 0.7; }
        if (ball.y + ball.radius > canvas.height) {
            // Упал на пол — сброс
            resetBall();
            return;
        }
        if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy = -ball.vy * 0.5; }

        // ПРОВЕРКА ПОПАДАНИЯ В КОЛЬЦО
        const ballCenter = { x: ball.x, y: ball.y };
        const rimCenter = { x: hoop.x + hoop.width/2, y: hoop.y + hoop.height/2 };
        const distToRim = Math.hypot(ballCenter.x - rimCenter.x, ballCenter.y - rimCenter.y);
        const effectiveRimRadius = hoop.rimRadius * currentDifficulty.rimScale;

        if (distToRim < ball.radius + effectiveRimRadius && ball.vy > 0) {
            // ПОПАДАНИЕ!
            addPoints(10);
            showTempMessage('🏀 СВИШ! +10 ОЧКОВ 🏀');
            // Отскок
            ball.vy = -ball.vy * 0.6;
            ball.vx = ball.vx * 0.9;
            // Небольшое смещение чтобы не застревало
            ball.y = rimCenter.y - ball.radius - 5;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Фон баскетбольной площадки
        ctx.fillStyle = '#DEB887';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#BC8F8F';
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.fillRect(i, canvas.height - 20, 20, 20);
        }

        // КОЛЬЦО
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(hoop.x + hoop.width/2, hoop.y + hoop.height/2, hoop.rimRadius * currentDifficulty.rimScale, 0, Math.PI * 2);
        ctx.strokeStyle = '#ff6600';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.fillStyle = '#cc5500';
        ctx.fill();
        // Сетка
        ctx.beginPath();
        ctx.moveTo(hoop.x + hoop.width/2 - 12, hoop.y + hoop.height/2 + 8);
        ctx.lineTo(hoop.x + hoop.width/2, hoop.y + hoop.height/2 + 25);
        ctx.lineTo(hoop.x + hoop.width/2 + 12, hoop.y + hoop.height/2 + 8);
        ctx.fillStyle = '#aaa';
        ctx.fill();

        // МЯЧ
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#8B4513';
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.font = `${ball.radius + 6}px "Segoe UI Emoji"`;
        ctx.fillText(gameState.currentBallSkin, ball.x - 12, ball.y + 10);

        // Линия прицела при перетаскивании
        if (ball.isDragging) {
            ctx.beginPath();
            ctx.moveTo(ball.x, ball.y);
            ctx.lineTo(ball.dragX, ball.dragY);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Эффект сообщения
        if (effectTimer > 0 && lastShotResult) {
            ctx.font = 'bold 20px "Segoe UI"';
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 4;
            ctx.fillText(lastShotResult, canvas.width/2 - 100, 50);
            effectTimer--;
        }
        if (levelUpTimer > 0 && levelUpMessage) {
            ctx.font = 'bold 16px "Segoe UI"';
            ctx.fillStyle = '#00ffaa';
            ctx.fillText(levelUpMessage, canvas.width/2 - 150, 110);
            levelUpTimer--;
        }

        // Отображение сложности
        ctx.font = 'bold 12px monospace';
        ctx.fillStyle = '#ffffaa';
        ctx.fillText(`🎯 Сложность: ${Math.round((1 - currentDifficulty.rimScale) * 100)}%`, 10, 30);
    }

    // ==================== ОБРАБОТЧИКИ МЫШИ/ТАЧА ====================
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        canvasX = Math.min(Math.max(0, canvasX), canvas.width);
        canvasY = Math.min(Math.max(0, canvasY), canvas.height);
        return { mx: canvasX, my: canvasY };
    }

    function onPointerDown(e) {
        e.preventDefault();
        const { mx, my } = getCanvasCoords(e);
        const dx = mx - ball.x;
        const dy = my - ball.y;
        if (Math.hypot(dx, dy) < ball.radius + 10) {
            ball.isDragging = true;
            ball.dragX = mx;
            ball.dragY = my;
        }
    }

    function onPointerMove(e) {
        if (!ball.isDragging) return;
        e.preventDefault();
        const { mx, my } = getCanvasCoords(e);
        ball.dragX = mx;
        ball.dragY = my;
    }

    function onPointerUp(e) {
        if (!ball.isDragging) {
            return;
        }
        e.preventDefault();
        ball.isDragging = false;
        const { mx, my } = getCanvasCoords(e);
        let forceX = (ball.x - mx) * 0.25;
        let forceY = (ball.y - my) * 0.25;
        forceX = Math.min(Math.max(forceX, -12), 12);
        forceY = Math.min(Math.max(forceY, -15), 5);
        ball.vx = forceX;
        ball.vy = forceY;
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function gameLoop() {
        updatePhysics();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function loadProgress() {
        const saved = localStorage.getItem('basketballGame');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                gameState.coins = data.coins || 0;
                gameState.level = data.level || 1;
                gameState.targetScore = 100 + (gameState.level - 1) * 25;
                gameState.score = 0;
                gameState.skins = data.skins || gameState.skins;
                if (data.currentBallSkin) gameState.currentBallSkin = data.currentBallSkin;
                updateUI();
            } catch(e) {}
        }
    }

    function saveProgress() {
        const saveData = {
            coins: gameState.coins,
            level: gameState.level,
            skins: gameState.skins,
            currentBallSkin: gameState.currentBallSkin
        };
        localStorage.setItem('basketballGame', JSON.stringify(saveData));
    }

    setInterval(() => saveProgress(), 5000);

    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('touchstart', onPointerDown);
    window.addEventListener('touchmove', onPointerMove);
    window.addEventListener('touchend', onPointerUp);

    shopButton.onclick = () => {
        renderShopItems();
        shopModal.style.display = 'flex';
    };
    closeModalBtn.onclick = () => shopModal.style.display = 'none';
    window.onclick = (e) => { if (e.target === shopModal) shopModal.style.display = 'none'; };

    nextLevelBtn.onclick = () => {
        if (gameState.score > 0) {
            levelUp();
        } else {
            showTempMessage('🎯 Сначала набери очки на этом уровне!');
        }
    };

    loadProgress();
    updateUI();
    gameLoop();
</script>
</body>
</html>
